services:

  ml-api:
    image: rudra2006/spam-ml-api:latest
    build:
      context: .
      dockerfile: backend/Dockerfile.api
    container_name: spam_ml_api
    ports:
      - "5000:5000"
    environment:
      - FLASK_PORT=5000
      - MODEL_PATH=linear_svm_model.pkl
      - VECTORIZER_PATH=tfidf_vectorizer.pkl
      - LABEL_ENCODER_PATH=label_encoder.pkl
    networks:
      - spam_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  node-backend:
    image: rudra2006/spam-node-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile.node
    container_name: spam_node_backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - API=http://ml-api:5000/predict
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
    depends_on:
      - ml-api
    networks:
      - spam_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    image: rudra2006/spam-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URI=
    container_name: spam_frontend
    ports:
      - "80:80"
    depends_on:
      - node-backend
    networks:
      - spam_network
    restart: unless-stopped

networks:
  spam_network:
    driver: bridge
