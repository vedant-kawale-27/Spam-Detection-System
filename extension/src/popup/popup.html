<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Spam Detection Scanner</title>
  <style>
    body { font-family: system-ui, sans-serif; width: 260px; padding: 14px; }

    p { font-size: 12px; margin: 4px 0; }
    button { width: 100%; padding: 8px; margin-top: 8px; cursor: pointer; }

</html>
